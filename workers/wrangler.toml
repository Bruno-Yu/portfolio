name = "bruno-portfolio-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Database binding - database_id is not sensitive (public identifier)
[[d1_databases]]
binding = "DB"
database_name = "bruno-portfolio-db"
database_id = "060320c9-4fa0-4511-affa-b02d21c6d128"

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "portfolio-images"

[vars]
ENVIRONMENT = "development"
